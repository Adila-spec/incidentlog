<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Interview Garden 🌸</title>

<style>
:root{
  --bg1:#ffe4ec;
  --bg2:#e9d5ff;
  --bg3:#fff1f2;

  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;

  --rose:#f43f5e;
  --pink:#ec4899;
  --purple:#a855f7;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  color:var(--text);
  padding:30px;
}

.container{
  max-width:900px;
  margin:auto;
}

.header{
  text-align:center;
  margin-bottom:10px;
}

h1{
  font-size:2.2rem;
}

.sub{
  color:var(--muted);
  margin-top:6px;
}

.progress{
  text-align:center;
  margin:15px 0 25px;
  color:var(--muted);
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 10px 25px rgba(236,72,153,0.15);
}

.tags{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
}

.tag{
  padding:6px 12px;
  border-radius:999px;
  cursor:pointer;
  border:1px solid #ddd;
  background:white;
}

.tag.active{
  background:var(--rose);
  color:white;
  border:none;
}

.problem{
  font-size:1.15rem;
  line-height:1.5;
  margin-bottom:10px;
}

.dataset table{
  width:100%;
  border-collapse:collapse;
  font-size:0.9rem;
}

.dataset th, .dataset td{
  border:1px solid #eee;
  padding:6px;
}

.dataset th{
  background:#faf5ff;
}

/* ✅ REAL SQL EDITOR */
textarea{
  width:100%;
  min-height:140px;
  background:#0f172a;
  color:white;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  font-family:monospace;
  border:none;
  outline:none;
  resize:vertical;
}

.buttons{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:15px;
}

button{
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn{
  background:var(--rose);
  color:white;
}

.btn.alt{
  background:var(--purple);
}

.btn.light{
  background:#f3f4f6;
  color:#111;
}

.section{
  display:none;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:#fafafa;
  white-space:pre-wrap;
}

.footer-nav{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

.small{
  color:var(--muted);
  font-size:0.9rem;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>🌸 SQL Interview Garden 🌸</h1>
  <div class="sub">Healthcare Data Science SQL Practice</div>
</div>

<div class="progress" id="progress">Questions Completed: 0 / 75</div>

<div class="tags">
  <div class="tag active" onclick="setLevel('Beginner')">🌷 Beginner</div>
  <div class="tag" onclick="setLevel('Intermediate')">🩷 Intermediate</div>
  <div class="tag" onclick="setLevel('Interview')">🌹 Interview</div>
</div>

<div class="card">

  <div class="small" id="counter"></div>

  <div class="problem" id="question"></div>

  <div class="dataset" id="dataset"></div>

  <!-- ✅ REAL WRITABLE SQL BOX -->
  <textarea id="sqlInput" placeholder="Write your SQL here..."></textarea>

  <div class="buttons">
    <button class="btn light" onclick="toggle('hint')">🌷 Hint</button>
    <button class="btn alt" onclick="toggle('thinking')">💭 How To Think</button>
    <button class="btn" onclick="toggle('answer')">✨ Reveal Answer</button>
    <button class="btn" onclick="next()">➡️ Next Question</button>
  </div>

  <div class="section" id="hint"></div>
  <div class="section" id="thinking"></div>
  <div class="section" id="answer"></div>

</div>

<div class="footer-nav">
  <button onclick="prev()">⬅ Previous</button>
  <button onclick="next()">Next ➡</button>
</div>

</div>

<script>

const questions = [

{
level:"Beginner",
q:"The hospital CFO wants total salary expense per department.",
dataset:`
<table>
<tr><th>emp_id</th><th>dept</th><th>salary</th></tr>
<tr><td>1</td><td>Finance</td><td>95000</td></tr>
<tr><td>2</td><td>IT</td><td>87000</td></tr>
<tr><td>3</td><td>Finance</td><td>110000</td></tr>
</table>
`,
hint:"Think GROUP BY department.",
thinking:`
We need one row per department → GROUP BY  
We are summing salaries → SUM()
`,
answer:`
SELECT dept, SUM(salary)
FROM employees
GROUP BY dept;
`
},

{
level:"Intermediate",
q:"Calculate percentage of approved insurance claims.",
dataset:`
<table>
<tr><th>claim_id</th><th>status</th></tr>
<tr><td>1</td><td>approved</td></tr>
<tr><td>2</td><td>denied</td></tr>
<tr><td>3</td><td>approved</td></tr>
</table>
`,
hint:"Use conditional aggregation.",
thinking:`
Count approved claims / total claims
Use CASE inside SUM
`,
answer:`
SELECT 
100.0 * SUM(CASE WHEN status='approved' THEN 1 ELSE 0 END)
/ COUNT(*) AS approval_rate
FROM claims;
`
},

{
level:"Interview",
q:"Find highest-paid employee in each department.",
dataset:`
<table>
<tr><th>name</th><th>dept</th><th>salary</th></tr>
<tr><td>Alice</td><td>Finance</td><td>95000</td></tr>
<tr><td>Bob</td><td>IT</td><td>87000</td></tr>
<tr><td>Carol</td><td>Finance</td><td>110000</td></tr>
</table>
`,
hint:"Think ranking per group.",
thinking:`
Use RANK() OVER(PARTITION BY dept ORDER BY salary DESC)
Then filter rank = 1
`,
answer:`
SELECT *
FROM (
  SELECT *,
  RANK() OVER(PARTITION BY dept ORDER BY salary DESC) rnk
  FROM employees
) t
WHERE rnk = 1;
`
}

];

let index = 0;
let level = "Beginner";
let completed = 0;

function filtered(){
  return questions.filter(q => q.level === level);
}

function render(){

  const data = filtered();
  if(!data.length) return;

  const q = data[index % data.length];

  document.getElementById("question").innerText = q.q;
  document.getElementById("dataset").innerHTML = q.dataset;

  document.getElementById("hint").innerText = q.hint;
  document.getElementById("thinking").innerText = q.thinking;
  document.getElementById("answer").innerText = q.answer;

  document.getElementById("counter").innerText =
    `Question ${index+1} / ${data.length}`;

  document.getElementById("progress").innerText =
    `Questions Completed: ${completed} / 75`;

  hideAll();
}

function hideAll(){
  document.querySelectorAll(".section").forEach(s=>{
    s.style.display="none";
  });
}

function toggle(id){
  const el = document.getElementById(id);
  el.style.display = el.style.display === "block" ? "none" : "block";
}

function next(){
  index++;
  completed++;
  render();
}

function prev(){
  index = Math.max(0,index-1);
  render();
}

function setLevel(lvl){
  level = lvl;
  index = 0;

  document.querySelectorAll(".tag").forEach(t=>{
    t.classList.remove("active");
  });

  event.target.classList.add("active");

  render();
}

render();

</script>

</body>
</html>
