<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Interview Garden 🌸</title>

<style>
:root{
  --bg1:#ffe4ec;
  --bg2:#e9d5ff;
  --bg3:#fff1f2;

  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;

  --rose:#f43f5e;
  --purple:#a855f7;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial;
}

body{
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  padding:30px;
}

.container{max-width:900px;margin:auto;}

h1{text-align:center}

.card{
  background:white;
  padding:18px;
  margin:15px 0;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* TABLES */
table{
  width:100%;
  border-collapse:collapse;
  font-size:0.9rem;
}

th,td{
  border:1px solid #eee;
  padding:6px;
}

th{
  background:#faf5ff;
}

.sql{
  width:100%;
  min-height:120px;
  background:#0f172a;
  color:white;
  padding:12px;
  border-radius:10px;
  border:none;
  font-family:monospace;
}

/* buttons */
button{
  padding:8px 12px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  margin:5px;
}

.pink{background:#f43f5e;color:white}
.purple{background:#a855f7;color:white}
.gray{background:#eee}

.schema{
  font-size:0.9rem;
  color:#374151;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="container">

<h1>🌸 SQL Interview Garden 🌸</h1>

<!-- 🔥 FIX 1: GLOBAL DATABASE SCHEMA -->
<div class="card">
  <h3>📦 Database Schema (Practice Across Tables)</h3>

  <div class="schema">

    <b>Employees</b>(emp_id, name, division_id, salary, manager_id)<br>
    <b>Divisions</b>(division_id, division_name)<br>
    <b>Claims</b>(claim_id, emp_id, status, amount)<br>

  </div>
</div>

<!-- QUESTION -->
<div class="card">

  <h3 id="question"></h3>

  <div id="dataset"></div>

  <textarea class="sql" placeholder="Write SQL here..."></textarea>

  <div>
    <button class="pink" onclick="hint()">Hint</button>
    <button class="purple" onclick="think()">How To Think</button>
    <button class="gray" onclick="next()">Next</button>
  </div>

  <div id="hintBox"></div>
  <div id="thinkBox"></div>

</div>

</div>

<script>

const questions = [
{
q:"Using Employees + Divisions, find total salary per division name.",
dataset:`
<table>
<tr><th>emp_id</th><th>division_id</th><th>salary</th></tr>
<tr><td>1</td><td>100</td><td>40000</td></tr>
<tr><td>2</td><td>100</td><td>80000</td></tr>
</table>

<br>

<table>
<tr><th>division_id</th><th>division_name</th></tr>
<tr><td>100</td><td>Finance</td></tr>
</table>
`,
hint:"You need a JOIN + GROUP BY",
think:"Step 1: join tables. Step 2: group by division_name. Step 3: SUM salary."
},

{
q:"Using Employees + Claims, compute approval rate per employee.",
dataset:`
<table>
<tr><th>emp_id</th><th>status</th></tr>
<tr><td>1</td><td>approved</td></tr>
<tr><td>1</td><td>denied</td></tr>
<tr><td>2</td><td>approved</td></tr>
</table>
`,
hint:"Conditional aggregation",
think:"COUNT approved / COUNT total grouped by emp_id"
},

{
q:"Find highest paid employee per division using Employees + Divisions.",
dataset:`
<table>
<tr><th>name</th><th>division_id</th><th>salary</th></tr>
<tr><td>Alice</td><td>100</td><td>90000</td></tr>
<tr><td>Bob</td><td>100</td><td>70000</td></tr>
</table>
`,
hint:"Window function or subquery",
think:"Use RANK() OVER(PARTITION BY division_id ORDER BY salary DESC)"
}

];

let i = 0;

function render(){
  const q = questions[i];

  document.getElementById("question").innerText = q.q;
  document.getElementById("dataset").innerHTML = q.dataset;

  document.getElementById("hintBox").innerText = "";
  document.getElementById("thinkBox").innerText = "";
}

function hint(){
  document.getElementById("hintBox").innerText =
    questions[i].hint;
}

function think(){
  document.getElementById("thinkBox").innerText =
    questions[i].think;
}

function next(){
  if(i < questions.length - 1){
    i++;
    render();
  } else {
    alert("End of set");
  }
}

render();

</script>

</body>
</html>
