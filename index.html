<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Interview Garden 🌸</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#ffe4ec,#e9d5ff,#fff1f2);
  padding:30px;
}

.container{max-width:900px;margin:auto;}

.card{
  background:white;
  padding:16px;
  border-radius:14px;
  margin-bottom:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

h1{text-align:center}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #eee;
  padding:6px;
}

th{background:#faf5ff}

textarea{
  width:100%;
  min-height:120px;
  background:#0f172a;
  color:white;
  border:none;
  border-radius:10px;
  padding:10px;
  font-family:monospace;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  margin:5px;
  cursor:pointer;
}

.pink{background:#f43f5e;color:white}
.purple{background:#a855f7;color:white}
.gray{background:#e5e7eb}

.small{color:#6b7280;font-size:0.9rem}
</style>
</head>

<body>

<div class="container">

<h1>🌸 SQL Interview Garden (75 Questions)</h1>

<div class="card">
  <h3>📦 Schema (Fixed)</h3>
  <div class="small">
    Employees(emp_id, name, dept_id, salary)<br>
    Departments(dept_id, dept_name)<br>
    Claims(claim_id, emp_id, status)
  </div>
</div>

<div class="card">

  <div class="small" id="progress"></div>
  <h3 id="question"></h3>

  <div id="dataset"></div>

  <textarea placeholder="Write SQL here..."></textarea>

  <div>
    <button class="pink" onclick="hint()">Hint</button>
    <button class="purple" onclick="think()">Thinking</button>
    <button class="gray" onclick="next()">Next</button>
  </div>

  <div id="hintBox"></div>
  <div id="thinkBox"></div>

</div>

</div>

<script>

/////////////////////////////////////////////////////
// 1. FIXED DATABASE (3 TABLES, 4 ROWS EACH)
/////////////////////////////////////////////////////

const TABLES = {
  Employees: [
    {id:1,name:"Alice",dept_id:10,salary:90000},
    {id:2,name:"Bob",dept_id:10,salary:70000},
    {id:3,name:"Carol",dept_id:20,salary:120000},
    {id:4,name:"David",dept_id:30,salary:60000}
  ],
  Departments: [
    {dept_id:10,dept_name:"Finance"},
    {dept_id:20,dept_name:"IT"},
    {dept_id:30,dept_name:"HR"},
    {dept_id:40,dept_name:"Ops"}
  ],
  Claims: [
    {claim_id:1,emp_id:1,status:"approved"},
    {claim_id:2,emp_id:2,status:"denied"},
    {claim_id:3,emp_id:3,status:"approved"},
    {claim_id:4,emp_id:4,status:"approved"}
  ]
};

/////////////////////////////////////////////////////
// 2. QUESTION ENGINE (75 GENERATED QUESTIONS)
/////////////////////////////////////////////////////

const patterns = [
  "Total salary per department",
  "Average salary per department",
  "Top earner per department",
  "Employees above department average",
  "Approval rate per employee",
  "Employees with no claims",
  "Join employees with department name",
  "Second highest salary per department",
  "Count employees per department",
  "Departments with high total salary"
];

function generateQuestions(){
  const qs = [];
  for(let i=0;i<75;i++){
    const p = patterns[i % patterns.length];

    qs.push({
      q: `Q${i+1}: Using Employees + Departments + Claims → ${p}`,
      hint: "Think JOIN + aggregation + possible subquery",
      think: [
        "Identify required tables",
        "Determine if JOIN is needed",
        "Check if aggregation is required",
        "Check if filtering or ranking is needed"
      ],
      dataset: renderTables()
    });
  }
  return qs;
}

function renderTables(){
  return `
  <b>Employees</b><br>
  <table>
    <tr><th>id</th><th>name</th><th>dept_id</th><th>salary</th></tr>
    ${TABLES.Employees.map(r=>
      `<tr><td>${r.id}</td><td>${r.name}</td><td>${r.dept_id}</td><td>${r.salary}</td></tr>`
    ).join("")}
  </table>

  <br>

  <b>Departments</b><br>
  <table>
    <tr><th>dept_id</th><th>dept_name</th></tr>
    ${TABLES.Departments.map(r=>
      `<tr><td>${r.dept_id}</td><td>${r.dept_name}</td></tr>`
    ).join("")}
  </table>

  <br>

  <b>Claims</b><br>
  <table>
    <tr><th>claim_id</th><th>emp_id</th><th>status</th></tr>
    ${TABLES.Claims.map(r=>
      `<tr><td>${r.claim_id}</td><td>${r.emp_id}</td><td>${r.status}</td></tr>`
    ).join("")}
  </table>
  `;
}

const QUESTIONS = generateQuestions();

/////////////////////////////////////////////////////
// 3. ENGINE STATE
/////////////////////////////////////////////////////

let i = 0;

function render(){
  const q = QUESTIONS[i];

  document.getElementById("progress").innerText =
    `Question ${i+1} / 75`;

  document.getElementById("question").innerText = q.q;
  document.getElementById("dataset").innerHTML = q.dataset;

  document.getElementById("hintBox").innerText = "";
  document.getElementById("thinkBox").innerText = "";
}

function hint(){
  document.getElementById("hintBox").innerText =
    QUESTIONS[i].hint;
}

function think(){
  document.getElementById("thinkBox").innerText =
    QUESTIONS[i].think.join("\n");
}

function next(){
  if(i < QUESTIONS.length - 1){
    i++;
    render();
  } else {
    alert("🎉 Completed all 75 questions!");
  }
}

render();

</script>

</body>
</html>
