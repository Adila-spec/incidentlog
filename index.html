<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SQL Garden 🌸</title>

<style>
body{
  font-family:Arial;
  background:#ffe4ec;
  padding:30px;
}

.container{max-width:900px;margin:auto;}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

.sql{
  width:100%;
  min-height:120px;
  background:#0f172a;
  color:white;
  border:none;
  border-radius:10px;
  padding:10px;
  font-family:monospace;
}

button{
  margin:5px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.pink{background:#f43f5e;color:white}
.purple{background:#a855f7;color:white}
.gray{background:#e5e7eb}

.small{color:#6b7280;font-size:0.9rem}
</style>
</head>

<body>

<div class="container">

<h2>🌸 SQL Interview Garden</h2>

<!-- GLOBAL SCHEMA -->
<div class="card">
  <h3>📦 Schema</h3>
  <div class="small" id="schema"></div>
</div>

<!-- QUESTION -->
<div class="card">

  <div class="small" id="progress"></div>
  <h3 id="question"></h3>

  <div id="dataset"></div>

  <textarea class="sql" placeholder="Write SQL here..."></textarea>

  <div>
    <button class="pink" onclick="showHint()">Hint</button>
    <button class="purple" onclick="showThinking()">How To Think</button>
    <button class="gray" onclick="next()">Next</button>
  </div>

  <div id="hintBox"></div>
  <div id="thinkBox"></div>

</div>

</div>

<script>

/* =========================
   1. SCHEMA (GLOBAL)
========================= */
const SCHEMA = {
  Employees: ["emp_id","name","division_id","salary","manager_id"],
  Divisions: ["division_id","division_name"],
  Claims: ["claim_id","emp_id","status","amount"]
};

/* =========================
   2. QUESTION BANK (ONLY EDIT THIS)
========================= */
const QUESTION_BANK = [
{
  id:1,
  level:"Beginner",
  prompt:"Using Employees + Divisions, find total salary per division name.",
  dataset:`
<table>
<tr><th>emp_id</th><th>division_id</th><th>salary</th></tr>
<tr><td>1</td><td>100</td><td>40000</td></tr>
<tr><td>2</td><td>100</td><td>80000</td></tr>
</table>

<table>
<tr><th>division_id</th><th>division_name</th></tr>
<tr><td>100</td><td>Finance</td></tr>
</table>
`,
  hint:"JOIN + GROUP BY division_name",
  thinking:[
    "Join Employees with Divisions",
    "Group by division_name",
    "Use SUM(salary)"
  ]
},
{
  id:2,
  level:"Beginner",
  prompt:"Calculate approval rate per employee using Claims.",
  dataset:`
<table>
<tr><th>emp_id</th><th>status</th></tr>
<tr><td>1</td><td>approved</td></tr>
<tr><td>1</td><td>denied</td></tr>
</table>
`,
  hint:"Conditional aggregation",
  thinking:[
    "Count approved claims",
    "Divide by total claims",
    "Group by emp_id"
  ]
}
];

/* =========================
   3. ENGINE (DO NOT TOUCH)
========================= */

let index = 0;

function renderSchema(){
  let out = "";
  for(let t in SCHEMA){
    out += `<b>${t}</b>: (${SCHEMA[t].join(", ")})<br>`;
  }
  document.getElementById("schema").innerHTML = out;
}

function render(){
  const q = QUESTION_BANK[index];

  document.getElementById("progress").innerText =
    `Question ${index+1} / ${QUESTION_BANK.length}`;

  document.getElementById("question").innerText = q.prompt;
  document.getElementById("dataset").innerHTML = q.dataset;

  document.getElementById("hintBox").innerText = "";
  document.getElementById("thinkBox").innerText = "";
}

function showHint(){
  document.getElementById("hintBox").innerText =
    QUESTION_BANK[index].hint;
}

function showThinking(){
  document.getElementById("thinkBox").innerText =
    QUESTION_BANK[index].thinking.join("\n");
}

function next(){
  if(index < QUESTION_BANK.length - 1){
    index++;
    render();
  } else {
    alert("End of questions");
  }
}

renderSchema();
render();

</script>

</body>
</html>
